<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CanCan · 모두의 시간을 한 번에</title>
    <meta name="description" content="링크 하나로 모두의 회의 시간을 자동으로 추천받으세요." />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="CanCan" />
    <meta property="og:title" content="CanCan · 모두의 시간을 한 번에" />
    <meta property="og:description" content="링크 하나로 모두의 회의 시간을 자동으로 추천받으세요." />
    <meta property="og:url" content="https://cancantime.vercel.app" />
    <meta property="og:image" content="https://cancantime.vercel.app/og.png" />
    <meta property="og:image:width" content="1293" />
    <meta property="og:image:height" content="850" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CanCan · 모두의 시간을 한 번에" />
    <meta name="twitter:description" content="링크 하나로 모두의 회의 시간을 자동으로 추천받으세요." />
    <meta name="twitter:image" content="https://cancantime.vercel.app/og.png" />
  </head>
  <body>
    <style>
      #splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; align-items: center; justify-content: center;
        background: linear-gradient(160deg, #eff6ff 0%, #f8fafc 60%);
      }
      #splash img {
        width: min(78vw, 440px); height: auto;
        animation: splashPulse 1.4s ease-in-out infinite;
      }
      @keyframes splashPulse {
        0%, 100% { opacity: 0.85; transform: scale(0.99); }
        50% { opacity: 1; transform: scale(1); }
      }
    </style>
    <div id="root">
      <div id="splash"><img src="/og.png" alt="CanCan" /></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
